{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Universal Converter - Software Design & Architecture</title>
    <!-- Link to custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <!-- Glass Navbar -->
    <nav class="glass-nav">
        <a href="{% url 'home' %}" class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span>Universal Converter</span>
        </a>
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'convert_action' %}">Convert</a>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="main-container">
        {% block content %}
        <!-- Child templates inject their content here -->
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 SDA Project | Powered by Strategy & Factory Patterns</p>
    </footer>

</body>
</html>
